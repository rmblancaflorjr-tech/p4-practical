<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact page with form validation for a responsive multi-page website project." />
  <title>My Website | Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">MyWebsite</a>
      <button class="menu-btn" id="menuBtn" aria-label="Toggle Menu">☰</button>
      <nav class="nav" id="navMenu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container page">
    <section class="card">
      <h1>Contact Us</h1>
      <p>Fill out the form below and we will get back to you soon.</p>

      <form id="contactForm" class="form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your name" />
          <small class="error" id="nameError"></small>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" />
          <small class="error" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="Write your message"></textarea>
          <small class="error" id="messageError"></small>
        </div>

        <button type="submit" class="btn">Send Message</button>
        <p class="success" id="successMessage"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> MyWebsite. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
